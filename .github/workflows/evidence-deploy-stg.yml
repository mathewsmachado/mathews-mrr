name: Deploy Evidence Staging

on:
  pull_request:
    branches:
      - main
    paths:
      - evidence/**

jobs:
  evidence-deploy-stg:
    uses: ./.github/workflows/evidence-deploy.yml
    environment: stg
    with:
      gcp-project-id: ${{ vars.GCP_PROJECT_ID }}
      gcp-workload-identity-provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      gcp-service-account: ${{ vars.GCP_EVIDENCE_SERVICE_ACCOUNT }}
      vercel-org-id: ${{ vars.VERCEL_ORG_ID }}
      vercel-project-id: ${{ vars.VERCEL_PROJECT_ID }}
      vercel-project-name: ${{ vars.VERCEL_PROJECT_NAME }}
    secrets:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
